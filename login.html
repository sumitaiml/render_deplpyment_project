<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HRTech Platform — Login</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;600;700;800&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --primary: #00e5ff;
            --primary-dark: #00b8d4;
            --primary-glow: rgba(0, 229, 255, 0.35);
            --success: #00e5a0;
            --dark: #0a0e17;
            --bg-page: #080c14;
            --card: #0d1520;
            --border: rgba(0, 229, 255, 0.15);
            --border-hover: rgba(0, 229, 255, 0.4);
            --text: #e2e8f0;
            --text-muted: #8494a7;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg-page);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text);
            overflow: hidden;
        }

        /* === Particle Canvas === */
        #particles-canvas {
            position: fixed;
            inset: 0;
            z-index: 0;
            pointer-events: none;
        }

        /* === Layout === */
        .auth-wrapper {
            position: relative;
            z-index: 10;
            width: 100%;
            max-width: 460px;
            padding: 24px;
            animation: fadeInUp 0.7s ease-out;
        }

        /* === Brand === */
        .brand {
            text-align: center;
            margin-bottom: 36px;
        }

        .brand-logo {
            display: inline-flex;
            align-items: center;
            gap: 12px;
            font-family: 'Orbitron', sans-serif;
            font-weight: 700;
            font-size: 1.4em;
            color: var(--primary);
            text-shadow: 0 0 24px var(--primary-glow);
            letter-spacing: 1px;
            margin-bottom: 10px;
        }

        .brand-logo svg {
            filter: drop-shadow(0 0 8px var(--primary-glow));
        }

        .brand-tagline {
            font-size: 0.9em;
            color: var(--text-muted);
            letter-spacing: 0.03em;
        }

        /* === Card === */
        .auth-card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 30px 80px rgba(0,0,0,0.5), 0 0 60px rgba(0,229,255,0.06);
        }

        .auth-card-title {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.4em;
            font-weight: 700;
            color: var(--text);
            margin-bottom: 6px;
        }

        .auth-card-subtitle {
            font-size: 0.9em;
            color: var(--text-muted);
            margin-bottom: 32px;
        }

        /* === Form === */
        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            font-size: 0.85em;
            font-weight: 600;
            color: var(--text-muted);
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 0.06em;
        }

        .input-wrapper {
            position: relative;
        }

        .input-icon {
            position: absolute;
            left: 14px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-muted);
            pointer-events: none;
            display: flex;
            align-items: center;
        }

        input[type="email"],
        input[type="password"],
        input[type="text"] {
            width: 100%;
            background: rgba(0, 229, 255, 0.04);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 13px 14px 13px 42px;
            color: var(--text);
            font-family: 'Inter', sans-serif;
            font-size: 0.95em;
            transition: border-color 0.3s, box-shadow 0.3s;
            outline: none;
        }

        input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(0, 229, 255, 0.12);
            background: rgba(0, 229, 255, 0.07);
        }

        input::placeholder { color: rgba(132, 148, 167, 0.6); }

        .password-toggle {
            position: absolute;
            right: 14px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            color: var(--text-muted);
            cursor: pointer;
            padding: 4px;
            display: flex;
            align-items: center;
            transition: color 0.2s;
        }
        .password-toggle:hover { color: var(--primary); }

        /* === Submit Button === */
        .btn-submit {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
            color: #0a0e17;
            font-family: 'Orbitron', sans-serif;
            font-weight: 700;
            font-size: 0.95em;
            letter-spacing: 1px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 8px;
            position: relative;
            overflow: hidden;
        }

        .btn-submit:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 30px rgba(0, 229, 255, 0.35);
        }

        .btn-submit:active { transform: translateY(0); }

        .btn-submit:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .btn-spinner {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid rgba(10,14,23,0.3);
            border-top-color: #0a0e17;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            vertical-align: middle;
            margin-right: 8px;
        }

        /* === Divider === */
        .divider {
            display: flex;
            align-items: center;
            gap: 12px;
            margin: 24px 0;
            color: var(--text-muted);
            font-size: 0.8em;
        }
        .divider::before, .divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: var(--border);
        }

        /* === Footer Link === */
        .auth-footer {
            text-align: center;
            margin-top: 24px;
            font-size: 0.9em;
            color: var(--text-muted);
        }

        .auth-footer a {
            color: var(--primary);
            text-decoration: none;
            font-weight: 600;
            transition: text-shadow 0.2s;
        }

        .auth-footer a:hover {
            text-shadow: 0 0 12px var(--primary-glow);
        }

        /* === Alert === */
        .alert {
            padding: 12px 16px;
            border-radius: 8px;
            font-size: 0.9em;
            margin-bottom: 20px;
            display: none;
            align-items: center;
            gap: 10px;
            animation: fadeInUp 0.3s ease-out;
        }

        .alert.show { display: flex; }

        .alert-error {
            background: rgba(255, 80, 80, 0.1);
            border: 1px solid rgba(255, 80, 80, 0.35);
            color: #ff8080;
        }

        .alert-success {
            background: rgba(0, 229, 160, 0.08);
            border: 1px solid rgba(0, 229, 160, 0.3);
            color: var(--success);
        }

        /* === Animations === */
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(24px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* === Input validation states === */
        input.invalid {
            border-color: rgba(255, 80, 80, 0.6);
            box-shadow: 0 0 0 3px rgba(255, 80, 80, 0.1);
        }

        .field-error {
            font-size: 0.8em;
            color: #ff8080;
            margin-top: 5px;
            display: none;
        }
        .field-error.show { display: block; }
    </style>
</head>
<body>

<canvas id="particles-canvas"></canvas>

<div class="auth-wrapper">
    <!-- Brand -->
    <div class="brand">
        <div class="brand-logo">
            <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                <polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/>
            </svg>
            HRTECH PLATFORM
        </div>
        <div class="brand-tagline">AI-Powered Resume Ranking Intelligence</div>
    </div>

    <!-- Card -->
    <div class="auth-card">
        <div class="auth-card-title">Welcome Back</div>
        <div class="auth-card-subtitle">Sign in to your account to continue</div>

        <div class="alert alert-error" id="errorAlert">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/>
            </svg>
            <span id="errorText"></span>
        </div>

        <form id="loginForm" novalidate>
            <div class="form-group">
                <label for="email">Email Address</label>
                <div class="input-wrapper">
                    <span class="input-icon">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/>
                            <polyline points="22,6 12,13 2,6"/>
                        </svg>
                    </span>
                    <input type="email" id="email" placeholder="you@example.com" autocomplete="email" />
                </div>
                <div class="field-error" id="emailError">Please enter a valid email address.</div>
            </div>

            <div class="form-group">
                <label for="password">Password</label>
                <div class="input-wrapper">
                    <span class="input-icon">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
                            <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
                        </svg>
                    </span>
                    <input type="password" id="password" placeholder="Enter your password" autocomplete="current-password" />
                    <button type="button" class="password-toggle" onclick="togglePassword('password', this)" aria-label="Toggle password visibility">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>
                        </svg>
                    </button>
                </div>
                <div class="field-error" id="passwordError">Password is required.</div>
            </div>

            <button type="submit" class="btn-submit" id="submitBtn">SIGN IN</button>
        </form>

        <div class="divider">or</div>

        <div class="auth-footer">
            Don't have an account? <a href="/signup">Create Account</a>
        </div>
    </div>
</div>

<script>
    // ── Particle background (same as loading dashboard) ──────────────────────
    (function () {
        const canvas = document.getElementById('particles-canvas');
        const ctx = canvas.getContext('2d');
        let particles = [];

        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }

        function createParticles() {
            particles = [];
            for (let i = 0; i < 55; i++) {
                particles.push({
                    x: Math.random() * canvas.width,
                    y: Math.random() * canvas.height,
                    vx: (Math.random() - 0.5) * 0.4,
                    vy: (Math.random() - 0.5) * 0.4,
                    r: Math.random() * 2 + 0.5,
                    alpha: Math.random() * 0.5 + 0.1
                });
            }
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            particles.forEach(p => {
                p.x += p.vx; p.y += p.vy;
                if (p.x < 0 || p.x > canvas.width) p.vx *= -1;
                if (p.y < 0 || p.y > canvas.height) p.vy *= -1;
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
                ctx.fillStyle = `rgba(0,229,255,${p.alpha})`;
                ctx.fill();
            });
            // Draw connections
            for (let i = 0; i < particles.length; i++) {
                for (let j = i + 1; j < particles.length; j++) {
                    const dx = particles[i].x - particles[j].x;
                    const dy = particles[i].y - particles[j].y;
                    const dist = Math.sqrt(dx * dx + dy * dy);
                    if (dist < 120) {
                        ctx.beginPath();
                        ctx.moveTo(particles[i].x, particles[i].y);
                        ctx.lineTo(particles[j].x, particles[j].y);
                        ctx.strokeStyle = `rgba(0,229,255,${0.12 * (1 - dist / 120)})`;
                        ctx.lineWidth = 0.5;
                        ctx.stroke();
                    }
                }
            }
            requestAnimationFrame(draw);
        }

        resize();
        createParticles();
        draw();
        window.addEventListener('resize', () => { resize(); createParticles(); });
    })();

    // ── Password toggle ────────────────────────────────────────────────────────
    function togglePassword(id, btn) {
        const input = document.getElementById(id);
        const isText = input.type === 'text';
        input.type = isText ? 'password' : 'text';
        btn.innerHTML = isText
            ? `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>`
            : `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>`;
    }

    // ── Helpers ────────────────────────────────────────────────────────────────
    function showError(msg) {
        document.getElementById('errorText').textContent = msg;
        document.getElementById('errorAlert').classList.add('show');
    }

    function hideError() {
        document.getElementById('errorAlert').classList.remove('show');
    }

    function setFieldError(fieldId, errId, msg) {
        document.getElementById(fieldId).classList.add('invalid');
        const el = document.getElementById(errId);
        el.textContent = msg;
        el.classList.add('show');
    }

    function clearFieldError(fieldId, errId) {
        document.getElementById(fieldId).classList.remove('invalid');
        document.getElementById(errId).classList.remove('show');
    }

    function setLoading(on) {
        const btn = document.getElementById('submitBtn');
        btn.disabled = on;
        btn.innerHTML = on
            ? `<span class="btn-spinner"></span>SIGNING IN...`
            : 'SIGN IN';
    }

    async function fetchWithTimeout(url, options, timeoutMs) {
        const controller = new AbortController();
        const timer = setTimeout(() => controller.abort(), timeoutMs);
        try {
            return await fetch(url, { ...options, signal: controller.signal });
        } finally {
            clearTimeout(timer);
        }
    }

    async function parseResponse(res) {
        const text = await res.text();
        try {
            return JSON.parse(text);
        } catch (_) {
            return { detail: text || 'Unexpected server response.' };
        }
    }

    // ── If already logged in, skip to app ─────────────────────────────────────
    (function () {
        const token = localStorage.getItem('hrtech_token');
        if (token) {
            fetch(`/api/auth/verify?token=${encodeURIComponent(token)}`)
                .then(r => r.json())
                .then(d => { if (d.valid) window.location.href = '/app'; })
                .catch(() => {});
        }
    })();

    // ── Form submit ────────────────────────────────────────────────────────────
    document.getElementById('loginForm').addEventListener('submit', async function (e) {
        e.preventDefault();
        hideError();

        const email = document.getElementById('email').value.trim();
        const password = document.getElementById('password').value;

        let valid = true;

        clearFieldError('email', 'emailError');
        clearFieldError('password', 'passwordError');

        if (!email || !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
            setFieldError('email', 'emailError', 'Please enter a valid email address.');
            valid = false;
        }

        if (!password) {
            setFieldError('password', 'passwordError', 'Password is required.');
            valid = false;
        }

        if (!valid) return;

        setLoading(true);

        try {
            const res = await fetchWithTimeout('/api/auth/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email, password })
            }, 30000);

            const data = await parseResponse(res);

            if (res.ok) {
                localStorage.setItem('hrtech_token', data.access_token);
                localStorage.setItem('hrtech_user', JSON.stringify({ username: data.username, email: data.email }));
                window.location.href = '/app';
            } else {
                const msg = data.detail || 'Login failed. Please try again.';
                showError(msg);
            }
        } catch (err) {
            if (err && err.name === 'AbortError') {
                showError('Login request timed out. Backend may still be starting, please try again.');
            } else {
                showError('Network error. Please check your connection and try again.');
            }
        } finally {
            setLoading(false);
        }
    });

    // Clear field errors on input
    document.getElementById('email').addEventListener('input', () => clearFieldError('email', 'emailError'));
    document.getElementById('password').addEventListener('input', () => clearFieldError('password', 'passwordError'));
</script>
</body>
</html>
